version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deploy_agent
      POSTGRES_USER: deploy_agent
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploy_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://deploy_agent:localdev@db:5432/deploy_agent
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PORT: 4000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
