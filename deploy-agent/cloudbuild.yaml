steps:
  # Build API image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/api:${SHORT_SHA}', '-f', 'apps/api/Dockerfile', '.']

  # Build Web image (NEXT_PUBLIC_API_URL is baked into the static bundle at build time)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/web:${SHORT_SHA}'
      - '-f'
      - 'apps/web/Dockerfile'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_API_URL}'
      - '.'

  # Push API image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/api:${SHORT_SHA}']

  # Push Web image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/web:${SHORT_SHA}']

  # Deploy API to Cloud Run (public — allUsers invoker preserved via --allow-unauthenticated)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'deploy-agent-api'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/api:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--service-account'
      - 'deploy-agent@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--allow-unauthenticated'
      - '--quiet'

  # Deploy Web to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'deploy-agent-web'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/web:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--service-account'
      - 'deploy-agent@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--allow-unauthenticated'
      - '--quiet'

substitutions:
  _REGION: asia-east1
  _API_URL: https://wave-deploy-agent-api.punwave.com

options:
  logging: CLOUD_LOGGING_ONLY
