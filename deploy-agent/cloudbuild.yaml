steps:
  # Build API image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/api:${SHORT_SHA}', '-f', 'apps/api/Dockerfile', '.']

  # Build Web image (NEXT_PUBLIC_API_URL is baked into the static bundle at build time)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/web:${SHORT_SHA}'
      - '-f'
      - 'apps/web/Dockerfile'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_API_URL}'
      - '.'

  # Push API image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/api:${SHORT_SHA}']

  # Build Bot image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/bot:${SHORT_SHA}', '-f', 'apps/bot/Dockerfile', '.']

  # Push Web image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/web:${SHORT_SHA}']

  # Push Bot image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/bot:${SHORT_SHA}']

  # Deploy API to Cloud Run (public — allUsers invoker preserved via --allow-unauthenticated)
  # Round 44c (2026-04-28): memory 4Gi → 8Gi. legal-flow (426 MB zip) hit
  # 4237 MiB peak during background uploadSourceToGcs (Buffer.from + tar +
  # readFileSync of ~300 MB tarball) and Cloud Run OOM-killed the instance
  # mid-task. R44c-stream follow-up will refactor to streaming so memory
  # stops scaling with file size — for now 8Gi covers any reasonable upload.
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'deploy-agent-api'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/api:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '8Gi'
      - '--cpu'
      - '2'
      - '--service-account'
      - 'deploy-agent@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--allow-unauthenticated'
      - '--quiet'

  # Deploy Web to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'deploy-agent-web'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/web:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--service-account'
      - 'deploy-agent@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--allow-unauthenticated'
      - '--quiet'

  # Deploy Bot to Cloud Run (always-on for Discord WebSocket)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'deploy-agent-bot'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/deploy-agent/bot:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '1'
      - '--no-cpu-throttling'
      - '--service-account'
      - 'deploy-agent@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--no-allow-unauthenticated'
      - '--update-secrets=DISCORD_TOKEN=DISCORD_TOKEN:latest,DISCORD_APP_ID=DISCORD_APP_ID:latest,DISCORD_GUILD_ID=DISCORD_GUILD_ID:latest,DISCORD_CHANNEL_ID=DISCORD_CHANNEL_ID:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,OPENAI_API_KEY=openai-api-key:latest'
      - '--set-env-vars=API_BASE_URL=https://wave-deploy-agent-api.punwave.com'
      - '--quiet'

substitutions:
  _REGION: asia-east1
  _API_URL: https://wave-deploy-agent-api.punwave.com

options:
  logging: CLOUD_LOGGING_ONLY
